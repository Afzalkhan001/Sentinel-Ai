services:
  sentinel:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Optional: a free Groq key enables the built-in default target model.
      # Users can also add their own keys in the UI at runtime.
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - PORT=8000
      - DATABASE_URL=sqlite:////app/data/sentinel.db
    volumes:
      # persist the SQLite database (scan/run history) across restarts
      - sentinel-data:/app/data
    restart: unless-stopped

volumes:
  sentinel-data:

<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sentinel AI — AI Security Testing Platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070a12"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientTransform="translate(150 40) scale(520)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientTransform="translate(1150 300) scale(560)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#ffffff" stroke-opacity="0.03"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#glow1)"/>
  <rect width="1200" height="320" fill="url(#glow2)"/>

  <!-- Shield emblem -->
  <g transform="translate(96 96)">
    <rect x="-8" y="-8" width="128" height="128" rx="28" fill="url(#accent)" opacity="0.12"/>
    <path d="M56 6l44 18v30c0 28-19 53-44 62C31 107 12 82 12 54V24L56 6z" fill="url(#accent)" opacity="0.18"/>
    <path d="M56 6l44 18v30c0 28-19 53-44 62C31 107 12 82 12 54V24L56 6z" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <path d="M38 56l12 12 24-26" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="270" y="128" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1">Sentinel AI</text>
  <text x="272" y="172" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26" font-weight="500" fill="#94a3b8">Burp Suite for LLMs — automated AI security testing</text>

  <!-- Stat pills -->
  <g font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="600">
    <g transform="translate(272 210)">
      <rect width="188" height="42" rx="21" fill="#0e1420" stroke="#1e2a3e"/>
      <circle cx="26" cy="21" r="5" fill="#38bdf8"/>
      <text x="44" y="27" fill="#cbd5e1">51 built-in attacks</text>
    </g>
    <g transform="translate(476 210)">
      <rect width="210" height="42" rx="21" fill="#0e1420" stroke="#1e2a3e"/>
      <circle cx="26" cy="21" r="5" fill="#818cf8"/>
      <text x="44" y="27" fill="#cbd5e1">8 test categories</text>
    </g>
    <g transform="translate(702 210)">
      <rect width="228" height="42" rx="21" fill="#0e1420" stroke="#1e2a3e"/>
      <circle cx="26" cy="21" r="5" fill="#22c55e"/>
      <text x="44" y="27" fill="#cbd5e1">Autonomous Red Team</text>
    </g>
    <g transform="translate(946 210)">
      <rect width="176" height="42" rx="21" fill="#0e1420" stroke="#1e2a3e"/>
      <circle cx="26" cy="21" r="5" fill="#f59e0b"/>
      <text x="44" y="27" fill="#cbd5e1">OWASP LLM Top 10</text>
    </g>
  </g>
</svg>
